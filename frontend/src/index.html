<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Clínica Cordillera Ancash — Salud especializada en Huaraz</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Clínica multiespecialidad en Huaraz, Ancash. Atención médica con tecnología de vanguardia y calidez humana. Reserva tu cita.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap">
  <!--
    URL del backend en producción (Render). El resolver de environment.ts lee
    window.__API_URL__ con máxima prioridad, por lo que SOLO lo definimos cuando
    NO estamos en local ni en Codespaces (ahí el resolver detecta el host solo).
    Este script inline corre antes que el bundle de Angular (module diferido).
  -->
  <script>
    (function () {
      var h = location.hostname;
      var isDev = h === 'localhost' || h === '127.0.0.1' || h.endsWith('.app.github.dev');
      if (!isDev) {
        window.__API_URL__ = 'https://sistema-medico-backend-nvf0.onrender.com/api/v1';
      }
      var theme = localStorage.getItem('theme');
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
