<div class="shell">
  <header class="navbar">
    <div class="nav-left">
      <a class="nav-brand" routerLink="/dashboard">
        <img src="assets/logo.png" alt="Clínica Cordillera" class="nav-logo" />
        <strong>Clínica Cordillera</strong>
      </a>
      <nav class="nav-links">
        @for (link of links(); track link.path) {
          <a [routerLink]="link.path" routerLinkActive="active">{{ link.label }}</a>
        }
      </nav>
    </div>
    <div class="nav-user">
      <button class="theme-toggle" (click)="theme.toggle()" [attr.aria-label]="theme.current() === 'dark' ? 'Modo claro' : 'Modo oscuro'">
        @if (theme.current() === 'dark') {
          <img src="assets/svg/claro.svg" alt="Modo claro" width="20" height="20" />
        } @else {
          <img src="assets/svg/noche.svg" alt="Modo oscuro" width="20" height="20" />
        }
      </button>
      <app-notification-bell />
      <a class="user-meta" routerLink="/perfil" title="Mi perfil">
        <span class="name">{{ user()?.nombre }} {{ user()?.apellido }}</span>
        <span class="role-badge">{{ roleLabel() }}</span>
      </a>
      <button class="btn-logout" (click)="logout()">Salir</button>
    </div>
  </header>

  <main class="content">
    <router-outlet />
  </main>
</div>
