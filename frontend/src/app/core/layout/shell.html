<div class="shell">
  <header class="navbar">
    <div class="nav-left">
      <div class="nav-brand">
        <span class="logo">🩺</span>
        <strong>Sistema Médico</strong>
      </div>
      <nav class="nav-links">
        @for (link of links(); track link.path) {
          <a [routerLink]="link.path" routerLinkActive="active">{{ link.label }}</a>
        }
      </nav>
    </div>
    <div class="nav-user">
      <div class="user-meta">
        <span class="name">{{ user()?.nombre }} {{ user()?.apellido }}</span>
        <span class="role-badge">{{ roleLabel() }}</span>
      </div>
      <button class="btn-logout" (click)="logout()">Salir</button>
    </div>
  </header>

  <main class="content">
    <router-outlet />
  </main>
</div>
