<h1>Hola, {{ user()?.nombre }} 👋</h1>
<p class="lead">Bienvenido a tu panel de <strong>{{ roleLabel() }}</strong>.</p>

<div class="cards">
  @for (card of cards(); track card.title) {
    @let clickable = card.status === 'listo' && card.link;
    <a
      class="card"
      [class.clickable]="clickable"
      [routerLink]="clickable ? card.link : null"
    >
      <span class="card-icon">{{ card.icon }}</span>
      <div class="card-body">
        <h3>{{ card.title }}</h3>
        <p>{{ card.desc }}</p>
      </div>
      <span class="tag" [class.tag-soon]="card.status === 'pronto'">
        {{ card.status === 'listo' ? 'Disponible' : 'Próximamente' }}
      </span>
    </a>
  }
</div>
