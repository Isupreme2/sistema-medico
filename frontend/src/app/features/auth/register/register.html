<div class="auth-wrapper">
  <div class="auth-card register-card">
    <div class="brand">
      <img class="logo" src="assets/logo.png" alt="Clínica Cordillera" />
      <p class="title">Crear cuenta</p>
      <p class="subtitle">Regístrate como paciente en Clínica Cordillera</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field-row two">
        <label class="field">
          <span>Nombre</span>
          <input type="text" formControlName="nombre" placeholder="Juan" />
          @if (form.controls.nombre.touched && form.controls.nombre.invalid) {
            <small class="err">Obligatorio</small>
          }
        </label>

        <label class="field">
          <span>Apellido</span>
          <div class="input-wrap">
          <img class="input-icon" src="assets/svg/perfil.svg" alt="" />
          <input type="text" formControlName="apellido" placeholder="Gómez" />
        </div>
          @if (form.controls.apellido.touched && form.controls.apellido.invalid) {
            <small class="err">Obligatorio</small>
          }
        </label>
      </div>

      <label class="field">
        <span>Correo electrónico</span>
        <div class="input-wrap">
          <img class="input-icon" src="assets/svg/correo.svg" alt="" />
          <input
            type="email"
            formControlName="email"
            placeholder="tucorreo@ejemplo.com"
            autocomplete="email"
          />
        </div>
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="err">Ingresa un email válido</small>
        }
      </label>

      <label class="field">
        <span>Teléfono (opcional)</span>
        <div class="input-wrap">
          <img class="input-icon" src="assets/svg/telefono.svg" alt="" />
          <input type="text" formControlName="telefono" placeholder="999888777" inputmode="numeric" />
        </div>
      </label>

      <div class="field-row doc">
        <label class="field doc-tipo">
          <span>Documento</span>
          <select formControlName="tipoDocumento">
            <option value="DNI">DNI</option>
            <option value="CE">C. Extranjería</option>
            <option value="PAS">Pasaporte</option>
          </select>
        </label>
        <label class="field doc-num">
          <span>N° de documento</span>
          <div class="input-wrap">
            <img class="input-icon" src="assets/svg/documento.svg" alt="" />
            <input
              type="text"
              formControlName="numeroDocumento"
              placeholder="70123456"
              inputmode="numeric"
            />
          </div>
          @if (form.controls.numeroDocumento.touched && form.controls.numeroDocumento.invalid) {
            <small class="err">Ingresa tu número de documento</small>
          }
        </label>
      </div>

      <div class="field-row doc">
        <label class="field doc-num">
          <span>Fecha de nacimiento (opcional)</span>
          <input type="date" formControlName="fechaNacimiento" />
        </label>
        <label class="field doc-tipo">
          <span>Sexo (opcional)</span>
          <select formControlName="sexo">
            <option value="">—</option>
            <option value="M">Masculino</option>
            <option value="F">Femenino</option>
            <option value="O">Otro</option>
          </select>
        </label>
      </div>
      <small class="hint-demo">Ayudan al médico a evaluar mejor tu riesgo clínico.</small>

      <label class="field">
        <span>Contraseña</span>
        <div class="input-wrap">
          <img class="input-icon" src="assets/svg/contraseña.svg" alt="" />
          <input
            type="password"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small class="err">Mínimo 8 caracteres, con mayúscula, minúscula y número</small>
        }
      </label>

      @if (error()) {
        <div class="alert">{{ error() }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Creando…' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="footer">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </div>
</div>
