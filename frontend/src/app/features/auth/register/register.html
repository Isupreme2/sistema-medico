<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <span class="logo">🩺</span>
      <h1>Crear cuenta</h1>
      <p class="subtitle">Regístrate como paciente</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span>Nombre</span>
        <input type="text" formControlName="nombre" placeholder="Juan" />
        @if (form.controls.nombre.touched && form.controls.nombre.invalid) {
          <small class="err">El nombre es obligatorio</small>
        }
      </label>

      <label class="field">
        <span>Apellido</span>
        <input type="text" formControlName="apellido" placeholder="Gómez" />
        @if (form.controls.apellido.touched && form.controls.apellido.invalid) {
          <small class="err">El apellido es obligatorio</small>
        }
      </label>

      <label class="field">
        <span>Correo electrónico</span>
        <input type="email" formControlName="email" placeholder="tucorreo@ejemplo.com" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="err">Ingresa un email válido</small>
        }
      </label>

      <label class="field">
        <span>Teléfono (opcional)</span>
        <input type="text" formControlName="telefono" placeholder="999888777" />
      </label>

      <label class="field">
        <span>Contraseña</span>
        <input type="password" formControlName="password" placeholder="••••••••" autocomplete="new-password" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small class="err">Mínimo 8 caracteres, con mayúscula, minúscula y número</small>
        }
      </label>

      @if (error()) {
        <div class="alert">{{ error() }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Creando…' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="footer">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</div>
