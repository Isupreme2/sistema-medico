<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <span class="logo">🩺</span>
      <h1>Sistema Médico</h1>
      <p class="subtitle">Gestión de Consultorios — EHR</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span>Correo electrónico</span>
        <input type="email" formControlName="email" placeholder="tucorreo@ejemplo.com" autocomplete="username" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="err">Ingresa un email válido</small>
        }
      </label>

      <label class="field">
        <span>Contraseña</span>
        <input type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small class="err">La contraseña es obligatoria</small>
        }
      </label>

      @if (requires2FA()) {
        <label class="field">
          <span>Código de verificación (2FA)</span>
          <input type="text" formControlName="totp" placeholder="123456" maxlength="6" inputmode="numeric" />
        </label>
      }

      @if (error()) {
        <div class="alert">{{ error() }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Ingresando…' : 'Iniciar sesión' }}
      </button>
    </form>

    <p class="footer">
      ¿No tienes cuenta? <a routerLink="/register">Regístrate como paciente</a>
    </p>
  </div>
</div>
