<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <img class="logo" src="assets/logo.png" alt="Clínica Cordillera" />
      <p class="title">Portal clínico — Inicia sesión</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span>Correo electrónico</span>
        <div class="input-wrap">
          <img class="input-icon" src="assets/svg/correo.svg" alt="logo correo" />
          <input
            type="email"
            formControlName="email"
            placeholder="tucorreo@ejemplo.com"
            autocomplete="username"
          />
        </div>
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="err">Ingresa un email válido</small>
        }
      </label>

      <label class="field">
        <span>Contraseña</span>
        <div class="input-wrap">
          <img class="input-icon" src="assets/svg/contraseña.svg" alt="logo contraseña" />
          <input
            type="password"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small class="err">La contraseña es obligatoria</small>
        }
      </label>

      @if (requires2FA()) {
        <label class="field">
          <span>Código de verificación (2FA)</span>
          <input
            type="text"
            formControlName="totp"
            placeholder="123456"
            maxlength="6"
            inputmode="numeric"
          />
        </label>
      }

      @if (error()) {
        <div class="alert">{{ error() }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        <span>{{ loading() ? 'Ingresando…' : 'Iniciar sesión' }}</span>
      </button>
    </form>

    <p class="footer">¿No tienes cuenta? <a routerLink="/register">Regístrate como paciente</a></p>
    <p class="footer back">
      <a routerLink="/">
        <img class="btn-icon" src="assets/svg/flecha.svg" alt="" />
        <span>Volver al sitio</span>
      </a>
    </p>
  </div>
</div>
